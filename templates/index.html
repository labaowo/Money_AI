<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money - 專業級 AI 程式設計助理</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0f172a; color: #e2e8f0; display: flex; height: 100vh; justify-content: center; align-items: center; padding: 10px; }
        
        /* 🌐 核心：主 wrapper 預設為左右雙欄 (電腦版) */
        .main-wrapper { width: 100%; max-width: 1200px; height: 92vh; display: flex; gap: 20px; }
        
        /* 📂 左側專案管理面板 */
        .project-panel { width: 320px; background: #1e293b; border-radius: 16px; border: 1px solid #334155; padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); flex-shrink: 0; }
        .panel-title { font-size: 15px; font-weight: bold; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .project-textarea { width: 100%; flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; color: #fff; resize: none; font-size: 13px; line-height: 1.5; outline: none; }
        .project-textarea:focus { border-color: #38bdf8; }
        .btn-group { display: flex; gap: 8px; }
        .panel-btn { flex: 1; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .btn-save { background: #0284c7; color: white; }
        .btn-save:hover { background: #0369a1; }
        .btn-delete { background: #475569; color: #cbd5e1; }
        .btn-delete:hover { background: #ef4444; color: white; }
        .status-tag { font-size: 11px; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; background: #0f172a; color: #94a3b8; }

        /* 💬 右側聊天室 */
        .chat-container { flex: 1; background: #1e293b; border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); border: 1px solid #334155; overflow: hidden; }
        .chat-header { background: #0f172a; padding: 16px; display: flex; align-items: center; border-bottom: 1px solid #334155; }
        .chat-header h2 { font-size: 16px; font-weight: 600; color: #38bdf8; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; word-break: break-all; }
        .message.user { background: #0284c7; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.money { background: #334155; color: #f1f5f9; align-self: flex-start; border-bottom-left-radius: 4px; }
        pre { background: #0f172a; padding: 12px; border-radius: 8px; margin: 8px 0; overflow-x: auto; border: 1px solid #475569; position: relative; }
        code { font-family: 'Consolas', monospace; color: #38bdf8; font-size: 13px; }
        .copy-btn { position: absolute; right: 6px; top: 6px; background: #334155; border: none; color: #94a3b8; padding: 4px 6px; font-size: 11px; border-radius: 4px; cursor: pointer; }
        .chat-input-area { background: #0f172a; padding: 16px; border-top: 1px solid #334155; display: flex; gap: 12px; align-items: center; }
        .file-upload-label { cursor: pointer; color: #38bdf8; font-size: 26px; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: #1e293b; border: 1px solid #334155; transition: 0.2s; flex-shrink: 0; }
        #image-input { display: none; }
        textarea { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px; color: #fff; resize: none; height: 42px; font-size: 14px; outline: none; }
        .send-btn { background: #0284c7; color: #fff; border: none; padding: 0 18px; border-radius: 8px; font-weight: 600; cursor: pointer; height: 42px; transition: 0.2s; flex-shrink: 0; }
        #preview-box { display: none; background: #0284c7; color: white; padding: 8px 16px; font-size: 13px; align-items: center; gap: 8px; }

        /* 🚨【終極手機版響應式破線保護】當螢幕寬度小於 768px (手機或直立平板) 時強制啟動變形 */
        @media (max-width: 768px) {
            body { padding: 5px; height: 100vh; }
            .main-wrapper { flex-direction: column; gap: 10px; height: 100%; }
            /* 手機版專案面板自動縮小、橫向排列，浮在最上方不擋空間 */
            .project-panel { width: 100%; height: auto; padding: 10px; gap: 8px; }
            .project-textarea { height: 60px; flex: none; }
            .btn-group { width: 100%; }
            /* 聊天室在手機版自動填滿剩下所有的下方大空間 */
            .chat-container { flex: 1; height: auto; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <!-- 📂 左側面板：手機版會自動浮到最上方，電腦版則在左側 -->
        <div class="project-panel">
            <div class="panel-title">📁 專案永久記憶區</div>
            <div class="status-tag" id="project-status">狀態：日常閒聊模式 (無鎖定)</div>
            <textarea id="project-input" class="project-textarea" placeholder="在此貼上你的專案規格、架構、或是資料庫欄位定義..."></textarea>
            <div class="btn-group">
                <button class="panel-btn btn-save" onclick="saveProject()">鎖定專案</button>
                <button class="panel-btn btn-delete" onclick="deleteProject()">清除</button>
            </div>
        </div>

        <!-- 💬 右側面板：手機版會自動填滿下方大空間，電腦版則在右側 -->
        <div class="chat-container">
            <div class="chat-header">
                <h2>💻 Money 專業級 AI 助理 (雙軌主控台)</h2>
            </div>
            <div class="chat-messages" id="chat-box">
                <div class="message money">哈囉 Ching！我是 Money。我已經幫網頁版加入了『手機版變形防線』！現在不管是電腦大螢幕還是手機，專案記憶區跟聊天室都能完美呈現囉！💻</div>
            </div>
            <div id="preview-box">
                🖼️ <span id="file-name"></span>
                <span style="cursor:pointer;margin-left:auto;font-weight:bold;font-size:18px;" onclick="clearFile()">✕</span>
            </div>
            <div class="chat-input-area">
                <label class="file-upload-label" for="image-input" title="上傳 Bug 截圖或照片">📎</label>
                <input type="file" id="image-input" accept="image/*" onchange="previewImage(this)">
                <textarea id="user-input" placeholder="輸入訊息... (Enter 發送)"></textarea>
                <button class="send-btn" onclick="sendMessage()">發送</button>
            </div>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const imageInput = document.getElementById('image-input');
        const previewBox = document.getElementById('preview-box');
        const fileNameSpan = document.getElementById('file-name');
        const projectInput = document.getElementById('project-input');
        const projectStatus = document.getElementById('project-status');

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        async function saveProject() {
            const detail = projectInput.value.trim();
            if(!detail) return alert('請先輸入專案規格描述喔！');
            projectStatus.style.background = '#0369a1';
            projectStatus.style.color = '#fff';
            projectStatus.innerText = '🔒 狀態：專案架構永久鎖定中';
            
            appendMessage(`🤖 系統通知：已成功發送專案鎖定請求。`, 'money');
            await fetch('/web-chat', {
                method: 'POST',
                body: new URLSearchParams({'text': '漏動指令：記憶專案：' + detail})
            });
            alert('專案架構已成功釘入 Money 核心記憶！');
        }

        async function deleteProject() {
            projectInput.value = '';
            projectStatus.style.background = '#0f172a';
            projectStatus.style.color = '#94a3b8';
            projectStatus.innerText = '狀態：日常閒聊模式 (無鎖定)';
            
            await fetch('/web-chat', {
                method: 'POST',
                body: new URLSearchParams({'text': '刪除專案'})
            });
            alert('專案記憶已徹底抹除！');
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                fileNameSpan.innerText = "準備上傳照片: " + input.files[0].name;
                previewBox.style.display = 'flex';
            }
        }
        function clearFile() { imageInput.value = ''; previewBox.style.display = 'none'; }

        async function sendMessage() {
            const text = userInput.value.trim();
            const file = imageInput.files[0];
            if (!text && !file) return;

            if (text) { appendMessage(text, 'user'); } 
            else if (file) { appendMessage(`🖼️ 已發送一張生活照片/Bug 截圖`, 'user'); }
            
            userInput.value = '';
            clearFile();

            const loadingId = appendMessage('⏳ Money 正在用多模態大腦解析中...', 'money');
            const formData = new FormData();
            formData.append('text', text);
            if (file) formData.append('image', file);

            try {
                const response = await fetch('/web-chat', { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById(loadingId).remove();
                appendMessage(formatResponse(data.reply), 'money');
            } catch (err) {
                document.getElementById(loadingId).innerHTML = "⚠️ 雲端連線異常，請稍後再試。";
            }
        }

        function appendMessage(html, sender) {
            const id = 'msg-' + Date.now();
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.id = id;
            div.innerHTML = html;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function formatResponse(text) {
            let formatted = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                return `<pre><code>${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code><button class="copy-btn" onclick="navigator.clipboard.writeText(\`${code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`);alert('程式碼複製成功！')">複製</button></pre>`;
            });
            return formatted.replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
