services:
  - type: web
    name: money-ai-jarvis
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python voice_agent.py
    envVars:
      - key: BASE_URL
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
